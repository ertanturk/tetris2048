name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel build
        pip install -e ".[dev]"
      continue-on-error: false

    - name: Check if tests exist
      id: check_tests
      run: |
        if find tests -name '*.py' -type f 2>/dev/null | grep -q .; then
          echo "tests_exist=true" >> $GITHUB_OUTPUT
        else
          echo "tests_exist=false" >> $GITHUB_OUTPUT
        fi

    - name: Run tests with coverage
      if: steps.check_tests.outputs.tests_exist == 'true'
      run: pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=90 -v
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: No tests found - skipping test execution
      if: steps.check_tests.outputs.tests_exist == 'false'
      run: echo "⚠️  No tests found in tests/ directory. Skipping test execution."

    - name: Upload coverage to Codecov
      if: steps.check_tests.outputs.tests_exist == 'true'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
