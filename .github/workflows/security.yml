name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel build
        pip install bandit pip-audit
        pip install -e ".[dev]" 2>&1 || echo "Warning: Some dev dependencies failed to install, continuing..."
      continue-on-error: true

    - name: Check if code exists
      id: check_code
      run: |
        if find . -name '*.py' -type f -not -path './.venv/*' -not -path './tests/*' 2>/dev/null | grep -q .; then
          echo "code_exists=true" >> $GITHUB_OUTPUT
        else
          echo "code_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Security check with bandit
      if: steps.check_code.outputs.code_exists == 'true'
      run: bandit -c pyproject.toml -r src tests --format json --output bandit-report.json || true

    - name: Display bandit results
      if: steps.check_code.outputs.code_exists == 'true'
      run: bandit -c pyproject.toml -r src tests --format txt || true

    - name: No code found - skipping bandit
      if: steps.check_code.outputs.code_exists == 'false'
      run: echo "⚠️  No source code found. Skipping bandit security check."

    - name: Check if dependencies exist
      id: check_deps
      run: |
        if [ -f requirements-dev.txt ] && [ -s requirements-dev.txt ]; then
          echo "deps_exist=true" >> $GITHUB_OUTPUT
        else
          echo "deps_exist=false" >> $GITHUB_OUTPUT
        fi

    - name: Audit dependencies with pip-audit
      if: steps.check_deps.outputs.deps_exist == 'true'
      run: pip-audit -r requirements-dev.txt --desc || true
      continue-on-error: true

    - name: No dependencies file - skipping pip-audit
      if: steps.check_deps.outputs.deps_exist == 'false'
      run: echo "⚠️  No requirements-dev.txt found. Skipping pip-audit."
